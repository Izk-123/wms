<script>
(function() {
    // ── Configuration ────────────────────────────────────
    const WELCOME_SEEN_URL = "{% url 'accounts:tutorial-welcome-seen' %}";
    const TOUR_COMPLETE_URL = "{% url 'accounts:tutorial-complete' %}";
    const CSRF = "{{ csrf_token }}";

    // Helper — POST to an endpoint silently
    async function postSilent(url, data = {}) {
        try {
            await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': CSRF,
                },
                body: JSON.stringify(data),
            });
        } catch (e) { /* fail silently */ }
    }

    // ── Tour Steps ───────────────────────────────────────
    // Each step targets an element by CSS selector.
    // If the element doesn't exist on this page the step is skipped.
    const allSteps = [
        {
            element: '#sidebar',
            popover: {
                title: '📋 Navigation Sidebar',
                description: 'Everything you need is here. The sidebar is organized by module — Inventory, Procurement, Operations, Assets, and Reports.',
                side: 'right',
                align: 'start',
            }
        },
        {
            element: 'a[href*="inventory/items"]',
            popover: {
                title: '📦 Inventory Items',
                description: 'View and manage all inventory items. Each item has a SKU, category, unit of measure, and minimum stock level.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="stock/receive"]',
            popover: {
                title: '✅ Receive Stock',
                description: 'When goods arrive from a supplier, use Receive Stock to record them. The system updates balances automatically.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="stock/issue"]',
            popover: {
                title: '📤 Issue Stock',
                description: 'Issue materials to a project, department, or production line. The system checks available stock before allowing an issue.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="inventory/stock"]',
            popover: {
                title: '📊 Stock Levels',
                description: 'See current stock across all warehouses at a glance. Items below minimum stock are highlighted in red.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="procurement/requests"]',
            popover: {
                title: '🛒 Purchase Requests',
                description: 'Need to buy something? Create a Purchase Request. It goes through an approval workflow before a Purchase Order is raised.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="procurement/orders"]',
            popover: {
                title: '📋 Purchase Orders',
                description: 'Once a PR is approved, a Procurement Officer creates a Purchase Order and sends it to the supplier.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="operations/requests"]',
            popover: {
                title: '🏗 Material Requests',
                description: 'Project supervisors use Material Requests to request items from the warehouse. The Warehouse Manager approves them.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="operations/projects"]',
            popover: {
                title: '🏢 Projects',
                description: 'Track material consumption per construction or manufacturing project. Each project has its own cost report.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="assets"]',
            popover: {
                title: '🔧 Tools & Equipment',
                description: 'Register tools and equipment, assign them to staff or projects, and log maintenance records.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="reports/inventory"]',
            popover: {
                title: '📈 Reports',
                description: 'Generate inventory reports, stock movement reports, and project consumption reports. Export to Excel or PDF.',
                side: 'right',
            }
        },
        {
            element: 'a[href*="qr-scanner"]',
            popover: {
                title: '📷 QR Scanner',
                description: 'Use your phone camera to scan any item QR code and instantly view its details and stock levels.',
                side: 'right',
            }
        },
        {
            element: '#topbar',
            popover: {
                title: '🔔 Top Bar',
                description: 'Your username and notification bell are here. Low stock alerts and pending approvals will appear in notifications.',
                side: 'bottom',
                align: 'end',
            }
        },
        {
            // Last step — no element, centered on screen
            popover: {
                title: "🎉 You're All Set!",
                description: "You now know the basics of J&N WMS. If you ever need this tour again, go to My Profile and click <strong>Replay Tutorial</strong>.",
            }
        },
    ];

    // Role from Django context
    const userRole = "{{ request.user.role.name|default:'' }}";

    // Steps that require specific roles
    const roleSteps = {
        'a[href*="procurement/requests"]': ['Procurement Officer', 'Warehouse Manager', 'System Administrator'],
        'a[href*="procurement/orders"]': ['Procurement Officer', 'Warehouse Manager', 'System Administrator'],
        'a[href*="accounts"]': ['System Administrator'],
        'a[href*="reports/inventory"]': ['Warehouse Manager', 'System Administrator', 'Management'],
    };

    function getValidSteps() {
        return allSteps.filter(step => {
            if (!step.element) return true;

            // Check element exists on page
            const el = document.querySelector(step.element);
            if (!el) return false;

            // Check role restriction
            const allowedRoles = roleSteps[step.element];
            if (allowedRoles && !allowedRoles.includes(userRole)) {
                return false;
            }

            return true;
        });
    }

    // ── Driver.js Setup ──────────────────────────────────
    function startTour() {
        const driver = window.driver.js.driver({

            showProgress: true,
            animate: true,
            overlayOpacity: 0.6,
            smoothScroll: true,
            allowClose: true,

            nextBtnText: 'Next →',
            prevBtnText: '← Back',
            doneBtnText: 'Finish ✓',

            onDestroyStarted: async (element, step, options) => {
                // Mark as complete whenever tour ends (skip or finish)
                const currentStep = driver.getActiveIndex() || 0;
                await postSilent(TOUR_COMPLETE_URL, { step: currentStep });
                driver.destroy();
            },

            steps: getValidSteps(),
        });

        driver.drive();
    }

    // ── Welcome Modal Logic ──────────────────────────────
    {% if show_welcome_modal %}
    document.addEventListener('DOMContentLoaded', function() {
        const modalEl = document.getElementById('welcomeModal');
        if (!modalEl) return;

        const modal = new bootstrap.Modal(modalEl);
        modal.show();

        // Start Tour button
        document.getElementById('startTourBtn').addEventListener('click', async function() {
            await postSilent(WELCOME_SEEN_URL);
            modal.hide();
            setTimeout(startTour, 400);
        });

        // Skip button
        document.getElementById('skipTourBtn').addEventListener('click', async function() {
            await postSilent(WELCOME_SEEN_URL);
            await postSilent(TOUR_COMPLETE_URL, { step: 0 });
            modal.hide();
        });
    });

    // ── Auto Tour (welcome seen but tour not done) ────────
    {% elif show_tour %}
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(startTour, 800);
    });
    {% endif %}

    // ── Manual trigger — called by "Replay" button ───────
    window.replayTour = function() {
        startTour();
    };

})();
</script>
