<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont,
                         'Segoe UI', Arial, sans-serif;
            background: #f1f5f9;
            padding: 2rem 1rem;
            color: #334155;
        }

        .wrapper {
            max-width: 580px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1e293b, #0ea5e9);
            border-radius: 12px 12px 0 0;
            padding: 2rem;
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: .25rem;
        }

        .header p {
            color: rgba(255,255,255,.7);
            font-size: .85rem;
        }

        .body {
            background: white;
            padding: 2rem;
        }

        .footer {
            background: #f8fafc;
            border-radius: 0 0 12px 12px;
            padding: 1.25rem 2rem;
            text-align: center;
            font-size: .78rem;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
        }

        .alert-box {
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin: 1rem 0;
            font-size: .9rem;
        }

        .alert-danger {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }

        .alert-warning {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            color: #92400e;
        }

        .alert-success {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            color: #166534;
        }

        .alert-info {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            color: #1e40af;
        }

        .btn {
            display: inline-block;
            background: #0ea5e9;
            color: white;
            text-decoration: none;
            padding: .75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: .9rem;
            margin: 1rem 0;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: .875rem;
        }

        .table th {
            background: #f8fafc;
            padding: .6rem .75rem;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
        }

        .table td {
            padding: .6rem .75rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .badge {
            display: inline-block;
            padding: .2rem .6rem;
            border-radius: 999px;
            font-size: .75rem;
            font-weight: 600;
        }

        .badge-danger  { background: #fef2f2; color: #dc2626; }
        .badge-warning { background: #fffbeb; color: #d97706; }
        .badge-success { background: #f0fdf4; color: #16a34a; }
        .badge-info    { background: #eff6ff; color: #2563eb; }

        h2 {
            font-size: 1.1rem;
            color: #1e293b;
            margin-bottom: .75rem;
        }

        p {
            font-size: .9rem;
            line-height: 1.6;
            margin-bottom: .75rem;
            color: #475569;
        }

        .divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
<div class="wrapper">

    <div class="header">
        <h1>J&N Warehouse Management</h1>
        <p>{{ subject }}</p>
    </div>

    <div class="body">
        {% block email_body %}{% endblock %}
    </div>

    <div class="footer">
        <p>This is an automated message from J&N WMS.</p>
        <p>Please do not reply to this email.</p>
        <p style="margin-top:.5rem;">
            &copy; {{ year }} J&N Construction &amp; Manufacturing
        </p>
    </div>

</div>
</body>
</html>
