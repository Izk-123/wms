{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Create Invoice{% endblock %}
{% block page_title %}Create Invoice{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-12 col-lg-6">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{% url 'sales:order-list' %}" class="btn-wms-secondary" style="padding:.2rem .6rem;">
                <span class="material-icons" style="font-size:18px;">arrow_back</span>
            </a>
            <h5 class="fw-semibold mb-0 text-primary-wms">Create Invoice</h5>
        </div>
        <div class="wms-card">
            <div class="wms-card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-4 pt-3 border-top border-wms">
                        <button type="submit" class="btn-wms-primary">Create Invoice</button>
                        <a href="{% url 'sales:order-list' %}" class="btn-wms-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
