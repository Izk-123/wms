<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#1e293b; border:none; border-radius:16px; width:100%; max-width:440px; }
        .form-control { background:#0f172a; border:1px solid #334155; color:#f1f5f9; border-radius:8px; padding:.75rem 1rem; }
        .form-control:focus { background:#0f172a; border-color:#0ea5e9; color:#f1f5f9; box-shadow:0 0 0 3px rgba(14,165,233,.15); }
        .form-label { color:#94a3b8; font-size:.85rem; }
        .btn-primary { background:#0ea5e9; border:none; border-radius:8px; padding:.75rem; font-weight:600; }
        .btn-primary:hover { background:#0284c7; }
    </style>
</head>
<body>
<div class="card p-4 mx-3">
    <div class="text-center mb-4">
        <span class="material-icons" style="color:#0ea5e9;font-size:44px;">lock_reset</span>
        <h5 class="text-white mt-2 mb-1">Forgot Password?</h5>
        <p class="text-secondary" style="font-size:.85rem;">
            Enter your company email address and we'll send you a reset link.
        </p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label">Company Email Address</label>
            <input type="email" name="email"
                   class="form-control"
                   placeholder="yourname@jandn.mw" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
            Send Reset Link
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{% url 'accounts:login' %}"
           style="font-size:.82rem;color:#64748b;text-decoration:none;">
            ← Back to Login
        </a>
    </div>
</div>
</body>
</html>
