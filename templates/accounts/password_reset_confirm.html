<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set New Password | WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#1e293b; border:none; border-radius:16px; width:100%; max-width:440px; }
        .form-control { background:#0f172a; border:1px solid #334155; color:#f1f5f9; border-radius:8px; padding:.75rem 1rem; }
        .form-control:focus { background:#0f172a; border-color:#0ea5e9; color:#f1f5f9; box-shadow:0 0 0 3px rgba(14,165,233,.15); }
        .form-label { color:#94a3b8; font-size:.85rem; }
    </style>
</head>
<body>
<div class="card p-4 mx-3">
    <div class="text-center mb-4">
        <span class="material-icons" style="color:#0ea5e9;font-size:44px;">lock_open</span>
        <h5 class="text-white mt-2 mb-1">Set New Password</h5>
    </div>

    {% if validlink %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password1"
                   class="form-control" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="new_password2"
                   class="form-control" required>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger" style="font-size:.82rem;">
            {{ form.errors }}
        </div>
        {% endif %}
        <button type="submit" class="btn w-100"
                style="background:#0ea5e9;color:white;border-radius:8px;
                       padding:.75rem;font-weight:600;">
            Set New Password
        </button>
    </form>
    {% else %}
    <div class="alert alert-danger" style="font-size:.875rem;">
        This password reset link is invalid or has expired.
        Please request a new one.
    </div>
    <a href="{% url 'accounts:password_reset' %}"
       class="btn w-100"
       style="background:#0ea5e9;color:white;border-radius:8px;
              padding:.75rem;font-weight:600;">
        Request New Link
    </a>
    {% endif %}
</div>
</body>
</html>
