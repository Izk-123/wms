<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Locked | {{ company_name|default:"WMS" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#1e293b; border:none; border-radius:16px; width:100%; max-width:420px; }
    </style>
</head>
<body>
<div class="card p-4 mx-3 text-center">
    <span class="material-icons" style="font-size:52px;color:#ef4444;margin-bottom:1rem;">lock</span>
    <h5 class="text-white mb-2">Account Temporarily Locked</h5>
    <p class="text-secondary mb-4" style="font-size:.875rem;">
        Too many failed login attempts. Your account has been locked
        for <strong class="text-white">15 minutes</strong>.
    </p>
    <p class="text-secondary mb-4" style="font-size:.82rem;">
        If you believe this is a mistake, please contact your
        System Administrator.
    </p>
    <a href="{% url 'accounts:login' %}"
       class="btn w-100"
       style="background:#0ea5e9;color:white;border-radius:8px;
              padding:.75rem;font-weight:600;">
        Back to Login
    </a>
</div>
</body>
</html>
