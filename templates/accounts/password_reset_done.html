<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Your Email | WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#1e293b; border:none; border-radius:16px; width:100%; max-width:440px; }
    </style>
</head>
<body>
<div class="card p-4 mx-3 text-center">
    <span class="material-icons" style="color:#22c55e;font-size:52px;margin-bottom:1rem;">mark_email_read</span>
    <h5 class="text-white mb-2">Check Your Email</h5>
    <p class="text-secondary mb-4" style="font-size:.875rem;">
        If an account with that email exists, we've sent a password reset link.
        Check your inbox at your <strong class="text-white">@jandn.mw</strong> email.
    </p>
    <a href="{% url 'accounts:login' %}"
       class="btn w-100"
       style="background:#0ea5e9;color:white;border-radius:8px;padding:.75rem;font-weight:600;">
        Back to Login
    </a>
</div>
</body>
</html>
